<!DOCTYPE html>
<html>
<head>
  <title>Generate PNG Icons - AdminPanel</title>
</head>
<body>
  <h2>AdminPanel Icons</h2>
  <canvas id="icon180" width="180" height="180"></canvas>
  <canvas id="icon192" width="192" height="192"></canvas>
  <canvas id="icon512" width="512" height="512"></canvas>
  
  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, size, size);
      
      // Emoji
      ctx.font = `${size * 0.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🛡️', size / 2, size / 2);
      
      // Download link
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.textContent = `Download ${size}x${size}`;
      link.style.display = 'block';
      link.style.marginBottom = '10px';
      document.body.appendChild(link);
    }
    
    drawIcon('icon180', 180);
    drawIcon('icon192', 192);
    drawIcon('icon512', 512);
  </script>
</body>
</html>
